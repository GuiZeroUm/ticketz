# Detecta os robos de pre-visualizacao de link (WhatsApp, Facebook, Telegram,
# Twitter/X, LinkedIn, etc.). Esses robos NAO executam JavaScript, entao nao
# conseguem ler a logo/nome carregados pela SPA. Quando o user-agent casa,
# o frontend.conf roteia a requisicao para a rota /link-preview do backend,
# que devolve um HTML com as meta tags Open Graph personalizadas por empresa.
#
# Usuarios reais (navegadores) recebem $link_preview_bot = 0 e continuam
# carregando normalmente a SPA estatica.
map $http_user_agent $link_preview_bot {
    default                  0;
    "~*facebookexternalhit"  1;
    "~*facebookcatalog"      1;
    "~*WhatsApp"             1;
    "~*Twitterbot"           1;
    "~*Slackbot"             1;
    "~*Slack-ImgProxy"       1;
    "~*TelegramBot"          1;
    "~*Discordbot"           1;
    "~*LinkedInBot"          1;
    "~*Pinterest"            1;
    "~*redditbot"            1;
    "~*vkShare"              1;
    "~*W3C_Validator"        1;
    "~*Embedly"              1;
    "~*SkypeUriPreview"      1;
    "~*Applebot"             1;
    "~*Googlebot"            1;
    "~*bingbot"              1;
    "~*Google-InspectionTool" 1;
    "~*ia_archiver"          1;
}
