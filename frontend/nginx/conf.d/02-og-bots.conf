# Detecta crawlers de "link preview" (Open Graph) que NAO executam JS.
# Para esses, o nginx serve o HTML com as meta tags og:* do tenant (ver
# sites.d/frontend.conf -> /__og_preview). Usuarios reais seguem no SPA.
# Search engines (Googlebot/bingbot) NAO entram aqui de proposito, para nao
# receberem uma pagina sem conteudo.
map $http_user_agent $og_bot {
    default 0;
    "~*(facebookexternalhit|Facebot|WhatsApp|Twitterbot|Telegrambot|Telegram|LinkedInBot|Slackbot|Slack-ImgProxy|Discordbot|Pinterest|redditbot|vkShare|SkypeUriPreview|Viber|Line|Applebot-Extended|WhatsApp/|Mastodon|Iframely|TelegramBot)" 1;
}
