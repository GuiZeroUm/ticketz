location / {
    # Robos de pre-visualizacao de link (WhatsApp, Facebook, Telegram, etc.)
    # nao executam JavaScript, entao nao leem a logo/nome carregados pela SPA.
    # Quando o user-agent e' um desses robos ($link_preview_bot, definido em
    # conf.d/02-linkpreview-bots.conf) reescrevemos para a location interna
    # abaixo, que faz proxy para a rota /link-preview do backend e devolve as
    # meta tags Open Graph com a logo/nome da empresa (tenant) do subdominio.
    #
    # Usamos "rewrite ... last" (uso seguro de if no nginx) em vez de
    # "if { proxy_pass }" direto, pois a location implicita do if herdaria o
    # try_files abaixo e serviria o index.html antes do proxy. Usuarios reais
    # nao casam o if e continuam recebendo a SPA estatica normalmente.
    if ($link_preview_bot) {
        rewrite ^ /internal-link-preview last;
    }

    try_files $uri $uri/ /index.html;
    include include.d/nocache.conf;
}

# Interna: alcancada apenas via o rewrite acima (robos de pre-visualizacao).
# Nao herda try_files, portanto o proxy_pass e' de fato executado.
location = /internal-link-preview {
    internal;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_pass http://$backend_upstream/link-preview;
}

location /static {
   alias /var/www/public/static/;
   include include.d/allcache.conf;
}

location /manifest.json {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend_upstream/manifest.json;
}

location /socket.io/ {
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Nota: em ambientes sem volume compartilhado (ex: Railway) os anexos em
# /backend/public/ sao servidos diretamente pelo backend (rota /public/*),
# caindo no proxy /backend/ abaixo. O bloco de alias estatico foi removido
# porque dependia do volume backend_public montado no nginx.
location /backend/ {
    rewrite ^/backend/(.*) /$1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend_upstream;
}

include ticketz.d/*.conf;

include "include.d/spa.conf";
