location / {
    # Crawlers de link preview (WhatsApp/Telegram/etc.) recebem o HTML com as
    # meta tags Open Graph do tenant, servido pelo backend. Ver 02-og-bots.conf.
    if ($og_bot) {
        rewrite ^ /__og_preview last;
    }
    try_files $uri $uri/ /index.html;
    include include.d/nocache.conf;
}

# Handler interno do preview Open Graph: repassa ao backend informando o Host
# (tenant) e a URI original compartilhada.
location = /__og_preview {
    internal;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Original-URI $request_uri;
    rewrite ^ /og-preview break;
    proxy_pass http://$backend_upstream;
}

location /static {
   alias /var/www/public/static/;
   include include.d/allcache.conf;
}

location /manifest.json {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend_upstream/manifest.json;
}

location /socket.io/ {
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Nota: em ambientes sem volume compartilhado (ex: Railway) os anexos em
# /backend/public/ sao servidos diretamente pelo backend (rota /public/*),
# caindo no proxy /backend/ abaixo. O bloco de alias estatico foi removido
# porque dependia do volume backend_public montado no nginx.
location /backend/ {
    rewrite ^/backend/(.*) /$1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend_upstream;
}

include ticketz.d/*.conf;

include "include.d/spa.conf";
